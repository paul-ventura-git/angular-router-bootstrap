<div>product-detail works!
  <br>
  @for (product of products; track product.id) {

    <a
      [routerLink]="[
        '/products',
        product.category,
        product.id
      ]">

      {{ product.name }}

    </a>

    <br>

  }

  @if (product) {
    <h2>{{ product.name }}</h2>
    <p>Categoría: {{ product.category }}</p>
    <p>Precio: {{ product.price }}</p>
  }
  @else {
    <p>Producto no encontrado</p>
  }
  <button class="btn btn-primary" type="button" routerLink="/">
    Back to Home
  </button>
</div>
